<nav class="navbar" id="navbar">
    <div class="navbar-brand" (click)="goHome()" style="cursor:pointer;">
        <div class="logo-icon">📅</div>
        <span class="text-gradient">Weekwise</span>
    </div>
    <div class="navbar-actions">
        @if (authService.isLoggedIn()) {
        <div class="navbar-user-info">
            <span class="user-name">{{ getUserName() }}</span>
            @if (authService.getRole() === 'Admin') {
            <span class="role-badge role-badge-lead">Lead</span>
            } @else {
            <span class="role-badge role-badge-member">Member</span>
            }
        </div>
        }
        <button class="nav-item" title="Toggle Theme" (click)="toggleTheme()">
            <span class="nav-icon">@if (themeService.isDark()) { ☀️ } @else { 🌙 }</span>
            <span class="nav-label">Theme</span>
        </button>
        @if (authService.isLoggedIn()) {
        <button class="nav-item" title="Home" (click)="goHome()">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item nav-item-danger" title="Sign Out" (click)="$event.stopPropagation(); logout()">
            <span class="nav-icon">🚪</span>
            <span class="nav-label">Sign Out</span>
        </button>
        }
    </div>
</nav>
