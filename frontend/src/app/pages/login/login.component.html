<div class="login-page-container">
    <div class="login-card-premium">
        <!-- Top Link -->
        <div class="top-nav">
            <a routerLink="/register" class="signup-link">Signup →</a>
        </div>

        <!-- Content -->
        <div class="login-content">
            <h2 class="login-title">Here you can Login</h2>
            <p class="login-subtitle">Let's join us :)</p>

            <form (submit)="verifyLogin()" class="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email"
                        class="premium-input" autofocus required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password"
                        class="premium-input" required>
                </div>

                @if (error) {
                <div class="login-error">
                    ⚠️ {{ error }}
                </div>
                }

                <button type="submit" class="btn-login-gradient" [disabled]="!email || !password || isLoading">
                    @if (isLoading) {
                    <span class="spinner"></span>
                    } @else {
                    LOGIN
                    }
                </button>

                <a href="#" class="forgot-password" (click)="$event.preventDefault()">Forgot your password?</a>
            </form>
        </div>

        <!-- Wavy Background Decoration -->
        <div class="wave-container">
            <div class="wave wave1"></div>
            <div class="wave wave2"></div>
            <div class="wave wave3"></div>
        </div>
    </div>
</div>
