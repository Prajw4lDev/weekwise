<div class="login-page-container">
    <div class="login-card-premium">
        <!-- Content -->
        <div class="login-content">
            <h1 class="login-title">Accept Invitation</h1>
            <p class="login-subtitle" *ngIf="invitation">Join the team as {{ invitation.role }}</p>

            <div *ngIf="isLoading" class="loading-state">
                <p>Validating invitation...</p>
            </div>

            <div *ngIf="!isLoading && !isValid" class="error-state">
                <div class="login-error">{{ error }}</div>
                <button routerLink="/login" class="btn-login-gradient" style="margin-top: 1rem;">Back to Login</button>
            </div>

            <form *ngIf="!isLoading && isValid" (ngSubmit)="onSubmit()" #acceptForm="ngForm">
                <div class="login-error" *ngIf="error">
                    {{ error }}
                </div>

                <div class="input-group">
                    <label>Email (Invited)</label>
                    <input type="email" [value]="invitation?.email" disabled class="premium-input"
                        style="opacity: 0.7;">
                </div>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" [(ngModel)]="registerData.name" name="name" required class="premium-input"
                        placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" [(ngModel)]="registerData.password" name="password" required
                        class="premium-input" placeholder="Create a password">
                </div>

                <button type="submit" class="btn-login-gradient" [disabled]="!acceptForm.valid || isSubmitting">
                    {{ isSubmitting ? 'JOINING...' : 'JOIN TEAM' }}
                </button>
            </form>
        </div>

        <!-- Waves -->
        <div class="wave-container">
            <div class="wave wave1"></div>
            <div class="wave wave2"></div>
            <div class="wave wave3"></div>
        </div>
    </div>
</div>
