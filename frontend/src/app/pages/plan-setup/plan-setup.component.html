<section id="screen-plan-setup">
    <h2 class="mb-sm"><span class="icon">⚙️</span> Set Up This Week's Plan</h2>
    <p class="text-secondary mb-lg">Select team members and set category budget percentages.</p>

    <div class="grid-2">
        <div class="glass-card no-hover">
            <h3 class="mb-md">Select Team Members</h3>
            <div class="flex flex-col gap-xs">
                <label class="checkbox-label"><input type="checkbox" checked> Alice (Lead)</label>
                <label class="checkbox-label"><input type="checkbox" checked> Bob</label>
                <label class="checkbox-label"><input type="checkbox" checked> Charlie</label>
            </div>
            <div class="divider"></div>
            <div class="flex items-center justify-between">
                <span class="text-secondary">Team members selected:</span>
                <span style="font-weight:700; font-size:1.1rem;">3</span>
            </div>
            <div class="flex items-center justify-between mt-sm">
                <span class="text-secondary">Total hours to plan:</span>
                <span style="font-weight:700; font-size:1.1rem; color:var(--accent-primary);">90h</span>
            </div>
        </div>

        <div class="glass-card no-hover">
            <h3 class="mb-md">Category Budget</h3>
            <div class="flex flex-col gap-md">
                <div class="form-group">
                    <label>🟢 Client Focused</label>
                    <div class="flex items-center gap-sm">
                        <input type="number" class="form-input" value="50" min="0" max="100"
                            style="width:80px; text-align:center;">
                        <span class="text-secondary">% → 45h</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>🟡 Tech Debt</label>
                    <div class="flex items-center gap-sm">
                        <input type="number" class="form-input" value="30" min="0" max="100"
                            style="width:80px; text-align:center;">
                        <span class="text-secondary">% → 27h</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>🔵 R&amp;D</label>
                    <div class="flex items-center gap-sm">
                        <input type="number" class="form-input" value="20" min="0" max="100"
                            style="width:80px; text-align:center;">
                        <span class="text-secondary">% → 18h</span>
                    </div>
                </div>
            </div>
            <div class="divider"></div>
            <div class="flex items-center justify-between">
                <span class="text-secondary">Total:</span>
                <div class="validation-msg success" style="padding:6px 12px;">✓ 100% — Perfect!</div>
            </div>
            <button class="btn btn-primary mt-lg" style="width:100%;" (click)="savePlan()">Save Setup &amp; Start
                Planning</button>
        </div>
    </div>
</section>
