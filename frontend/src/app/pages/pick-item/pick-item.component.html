<section id="screen-pick-item">
    <div class="flex items-center justify-between mb-lg">
        <h2>Pick a Backlog Item</h2>
        <button class="btn btn-ghost" (click)="goBack()">← Back to My Plan</button>
    </div>
    <p class="text-secondary mb-md">You have <strong style="color:var(--status-done);">12 hours</strong> left to plan.
    </p>

    <div class="filter-tabs mb-md">
        <button class="filter-tab active">All</button>
        <button class="filter-tab">🟢 Client</button>
        <button class="filter-tab">🟡 Tech Debt</button>
        <button class="filter-tab">🔵 R&amp;D</button>
    </div>

    <div class="flex flex-col gap-sm mb-lg">
        <div class="glass-card" style="padding:var(--space-md); cursor:pointer;">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-sm">
                    <span class="badge badge-client">🟢 Client</span>
                    <span style="font-weight:600;">Dashboard Analytics</span>
                </div>
                <span class="text-secondary">12h est</span>
            </div>
        </div>
        <div class="glass-card" style="padding:var(--space-md); cursor:pointer; border:2px solid var(--border-accent);">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-sm">
                    <span class="badge badge-techdebt">🟡 Tech Debt</span>
                    <span style="font-weight:600;">CI/CD Pipeline Setup</span>
                </div>
                <span class="text-secondary">5h est</span>
            </div>
        </div>
    </div>

    <div class="glass-card no-hover" style="background:var(--bg-tertiary); padding:var(--space-md);">
        <h4 class="mb-sm">How many hours will you work on this?</h4>
        <div class="flex items-center gap-md">
            <input type="number" class="form-input" value="5" min="1" max="12" style="width:80px; text-align:center;">
            <span class="text-secondary">Your hours left: <strong style="color:var(--status-done);">12</strong></span>
        </div>
        <button class="btn btn-primary mt-md" (click)="addToPlan()">Add to My Plan</button>
    </div>
</section>
