<section id="screen-welcome">
    <h1 class="mb-md">👋 Welcome to <span class="text-gradient">Weekwise</span></h1>
    <p class="text-secondary mb-lg">Set up your team to get started. Add members and pick one as the Team Lead.</p>

    <div class="grid-2">
        <!-- Add Member Form -->
        <div class="glass-card no-hover">
            <h3 class="mb-md">Add a Team Member</h3>
            <div class="flex gap-sm">
                <input type="text" class="form-input" placeholder="Enter member name..." style="flex:1">
                <button class="btn btn-primary">+ Add</button>
            </div>
        </div>

        <!-- Team Roster -->
        <div class="glass-card no-hover">
            <h3 class="mb-md">Your Team</h3>
            <div class="flex flex-col gap-sm">
                <div class="flex items-center justify-between"
                    style="padding:10px 14px; background:var(--bg-card); border-radius:var(--radius-sm);">
                    <div class="flex items-center gap-sm">
                        <div class="avatar" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">A</div>
                        <div>
                            <div style="font-weight:600;">Alice</div>
                            <span class="badge badge-client" style="font-size:0.65rem;">👑 LEAD</span>
                        </div>
                    </div>
                    <button class="btn btn-icon btn-ghost" title="Remove">✕</button>
                </div>

                <div class="flex items-center justify-between"
                    style="padding:10px 14px; background:var(--bg-card); border-radius:var(--radius-sm);">
                    <div class="flex items-center gap-sm">
                        <div class="avatar" style="background: linear-gradient(135deg, #3b82f6, #06b6d4);">B</div>
                        <div>
                            <div style="font-weight:600;">Bob</div>
                            <span class="text-muted" style="font-size:0.75rem;">Member</span>
                        </div>
                    </div>
                    <div class="flex gap-xs">
                        <button class="btn btn-sm btn-ghost">Make Lead</button>
                        <button class="btn btn-icon btn-ghost" title="Remove">✕</button>
                    </div>
                </div>

                <div class="flex items-center justify-between"
                    style="padding:10px 14px; background:var(--bg-card); border-radius:var(--radius-sm);">
                    <div class="flex items-center gap-sm">
                        <div class="avatar" style="background: linear-gradient(135deg, #f59e0b, #ef4444);">C</div>
                        <div>
                            <div style="font-weight:600;">Charlie</div>
                            <span class="text-muted" style="font-size:0.75rem;">Member</span>
                        </div>
                    </div>
                    <div class="flex gap-xs">
                        <button class="btn btn-sm btn-ghost">Make Lead</button>
                        <button class="btn btn-icon btn-ghost" title="Remove">✕</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary mt-lg" style="width:100%;" (click)="continue()">Continue →</button>
        </div>
    </div>
</section>
