name: Weekwise CI/CD

on:
  push:
    branches: [main, develop, feature/frontend-backend-integration]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build, Test and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Frontend
        run: npx ng build --configuration=production
        working-directory: ./frontend

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Backend dependencies
        run: dotnet restore
        working-directory: ./backend

      - name: Prepare wwwroot
        run: |
          mkdir -p backend/src/Weekwise.Api/wwwroot
          cp -r frontend/dist/weekwise-frontend/browser/* backend/src/Weekwise.Api/wwwroot/

      - name: Build Backend
        run: dotnet build --no-restore --configuration Release
        working-directory: ./backend

      - name: Run Backend Tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ./backend

      - name: Publish Backend
        run: dotnet publish src/Weekwise.Api/Weekwise.Api.csproj -c Release -o ./publish
        working-directory: ./backend

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'weekwise-api-prajwal'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend/publish
